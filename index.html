<head>

<title>Buxgalteriya Hisoblari — Yodlash Testi</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0a0a12;
  --bg2: #111120;
  --bg3: #181830;
  --card: #16162a;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0f0f8;
  --text2: #9999bb;
  --text3: #6666aa;
  --g1: #7c3aed;
  --g2: #2563eb;
  --g3: #06b6d4;
  --g4: #10b981;
  --green: #10b981;
  --green-bg: rgba(16,185,129,0.12);
  --green-border: rgba(16,185,129,0.35);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,0.12);
  --red-border: rgba(239,68,68,0.35);
  --yellow: #f59e0b;
  --yellow-bg: rgba(245,158,11,0.12);
  --yellow-border: rgba(245,158,11,0.35);
  --radius: 16px;
  --radius-sm: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* BG MESH */
.bg-mesh {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 60% 50% at 20% 20%, rgba(124,58,237,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 80% 80%, rgba(6,182,212,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 50% 50%, rgba(37,99,235,0.08) 0%, transparent 70%);
}

.container {
  position: relative; z-index: 1;
  max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem 4rem;
}

/* HEADER */
.header { text-align: center; margin-bottom: 2.5rem; }
.header-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(124,58,237,0.15); border: 1px solid rgba(124,58,237,0.3);
  border-radius: 20px; padding: 4px 14px; font-size: 12px;
  color: #a78bfa; text-transform: uppercase; letter-spacing: 1.5px;
  margin-bottom: 1rem; font-weight: 600;
}
.header h1 {
  font-family: 'Syne', sans-serif; font-size: clamp(2rem, 6vw, 3.5rem);
  font-weight: 800; line-height: 1.1; margin-bottom: 0.5rem;
  background: linear-gradient(135deg, #a78bfa 0%, #60a5fa 50%, #34d399 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.header p { color: var(--text2); font-size: 15px; }

/* SCORE BAR */
.score-bar {
  display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap;
}
.pill {
  padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 600;
  border: 1px solid;
}
.pill-g { background: var(--green-bg); border-color: var(--green-border); color: var(--green); }
.pill-r { background: var(--red-bg); border-color: var(--red-border); color: var(--red); }
.pill-b { background: rgba(96,165,250,0.12); border-color: rgba(96,165,250,0.3); color: #60a5fa; }

/* PROGRESS */
.progress-track {
  background: var(--bg3); border-radius: 8px; height: 5px;
  margin-bottom: 1.5rem; overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 8px;
  background: linear-gradient(90deg, var(--g1), var(--g2), var(--g3));
  transition: width 0.4s cubic-bezier(.4,0,.2,1);
}

/* NAV TABS — see bottom of stylesheet for full definition */


/* CARD */
.card {
  background: var(--card); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 1.75rem;
  margin-bottom: 1rem; position: relative; overflow: hidden;
}
.card::before {
  content:''; position:absolute; inset:0;
  background: linear-gradient(135deg, rgba(124,58,237,0.05) 0%, transparent 60%);
  pointer-events:none;
}

/* QUESTION CARDS */
.q-card-purple {
  background: linear-gradient(135deg, rgba(124,58,237,0.2) 0%, rgba(37,99,235,0.15) 100%);
  border-color: rgba(124,58,237,0.3);
}
.q-card-teal {
  background: linear-gradient(135deg, rgba(6,182,212,0.15) 0%, rgba(16,185,129,0.12) 100%);
  border-color: rgba(6,182,212,0.3);
}
.q-label { font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; opacity: 0.7; margin-bottom: 10px; }
.q-code {
  font-family: 'JetBrains Mono', monospace; font-size: 64px; font-weight: 600;
  background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  line-height: 1; letter-spacing: 4px;
}
.q-name { font-size: 22px; font-weight: 600; line-height: 1.3; }
.q-sub { font-size: 13px; opacity: 0.6; margin-top: 6px; }

/* INPUTS */
.ans-input {
  width: 100%; padding: 14px 18px; border-radius: var(--radius-sm);
  font-size: 18px; font-weight: 500;
  border: 1.5px solid var(--border2); font-family: 'Space Grotesk', sans-serif;
  background: var(--bg2); color: var(--text);
  outline: none; transition: all 0.2s; margin-bottom: 12px;
}
.ans-input:focus { border-color: rgba(124,58,237,0.6); background: var(--bg3); box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }
.ans-input.ok { border-color: var(--green-border); background: var(--green-bg); color: var(--green); }
.ans-input.no { border-color: var(--red-border); background: var(--red-bg); color: var(--red); }

.num-input {
  flex: 1; padding: 14px; border-radius: var(--radius-sm);
  font-size: 28px; font-weight: 600; font-family: 'JetBrains Mono', monospace;
  border: 1.5px solid var(--border2); text-align: center; letter-spacing: 6px;
  background: var(--bg2); color: var(--text); outline: none; transition: all 0.2s;
}
.num-input:focus { border-color: rgba(124,58,237,0.6); background: var(--bg3); box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }
.num-input.ok { border-color: var(--green-border); background: var(--green-bg); color: var(--green); }
.num-input.no { border-color: var(--red-border); background: var(--red-bg); color: var(--red); }
.num-input.hint-ok { border-color: var(--yellow-border); }
.num-input.hint-no { border-color: var(--red-border); }

.input-row { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; }

/* FEEDBACK */
.feedback {
  border-radius: var(--radius-sm); padding: 14px 18px; font-size: 15px; font-weight: 600;
  text-align: center; margin-bottom: 12px; display: flex;
  align-items: center; justify-content: center; gap: 8px; min-height: 52px;
}
.fb-hidden { opacity: 0; pointer-events: none; }
.fb-ok { background: var(--green-bg); border: 1px solid var(--green-border); color: var(--green); }
.fb-no { background: var(--red-bg); border: 1px solid var(--red-border); color: #fca5a5; }
.fb-hint { background: var(--yellow-bg); border: 1px solid var(--yellow-border); color: var(--yellow); }

/* BUTTONS */
.btn-next {
  width: 100%; padding: 13px; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600;
  border: 1px solid var(--border2); cursor: pointer; background: var(--bg3); color: var(--text2);
  font-family: 'Space Grotesk', sans-serif; transition: all 0.2s;
}
.btn-next:hover { background: rgba(124,58,237,0.15); border-color: rgba(124,58,237,0.4); color: #a78bfa; }

/* OPTIONS GRID */
.opts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.opt {
  padding: 14px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500;
  cursor: pointer; text-align: center; border: 1px solid var(--border2);
  background: var(--bg2); color: var(--text); font-family: 'Space Grotesk', sans-serif;
  transition: all 0.15s; line-height: 1.4;
}
.opt:hover:not(:disabled) { background: var(--bg3); border-color: rgba(124,58,237,0.4); }
.opt.correct { background: var(--green-bg); border-color: var(--green-border); color: var(--green); }
.opt.wrong { background: var(--red-bg); border-color: var(--red-border); color: #fca5a5; }
.opt:disabled { cursor: default; }

/* FLASHCARD */
.flip-wrap { perspective: 1200px; margin-bottom: 1rem; cursor: pointer; }
.flip-card {
  position: relative; transform-style: preserve-3d;
  transition: transform 0.5s cubic-bezier(.4,0,.2,1);
  min-height: 200px;
}
.flip-card.flipped { transform: rotateY(180deg); }
.flip-face {
  position: absolute; width: 100%; min-height: 200px; backface-visibility: hidden;
  border-radius: var(--radius); padding: 2rem; display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center;
  border: 1px solid;
}
.flip-front {
  background: linear-gradient(135deg, rgba(124,58,237,0.25) 0%, rgba(37,99,235,0.2) 100%);
  border-color: rgba(124,58,237,0.35);
}
.flip-back {
  background: linear-gradient(135deg, rgba(6,182,212,0.2) 0%, rgba(16,185,129,0.15) 100%);
  border-color: rgba(6,182,212,0.35);
  transform: rotateY(180deg);
}
.flip-hint { font-size: 12px; opacity: 0.5; margin-bottom: 6px; letter-spacing: 1px; text-transform: uppercase; }
.flip-answer { font-size: 24px; font-weight: 700; line-height: 1.3; }
.flip-sub { font-size: 13px; opacity: 0.6; margin-top: 8px; }

.mark-btns { display: flex; gap: 8px; margin-bottom: 12px; }
.btn-correct {
  flex: 1; padding: 12px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 700;
  border: 1px solid var(--green-border); cursor: pointer;
  background: var(--green-bg); color: var(--green); font-family: 'Space Grotesk', sans-serif;
}
.btn-wrong {
  flex: 1; padding: 12px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 700;
  border: 1px solid var(--red-border); cursor: pointer;
  background: var(--red-bg); color: var(--red); font-family: 'Space Grotesk', sans-serif;
}

/* LIST VIEW */
.list-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.list-item {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 12px 16px; display: flex; flex-direction: column; gap: 4px;
  transition: border-color 0.2s;
}
.list-item:hover { border-color: rgba(124,58,237,0.4); }
.list-code {
  font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 600;
  background: linear-gradient(135deg, #a78bfa, #60a5fa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.list-name { font-size: 13px; color: var(--text2); line-height: 1.4; }

/* RESULT */
.result-big {
  background: linear-gradient(135deg, rgba(124,58,237,0.2) 0%, rgba(6,182,212,0.15) 100%);
  border: 1px solid rgba(124,58,237,0.3); border-radius: var(--radius);
  padding: 2.5rem; text-align: center; margin-bottom: 1rem;
}
.result-pct {
  font-family: 'Syne', sans-serif; font-size: 72px; font-weight: 800;
  background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.result-label { font-size: 15px; color: var(--text2); margin: 4px 0 12px; }
.result-msg { font-size: 20px; font-weight: 700; color: var(--text); }

.btn-restart {
  width: 100%; padding: 14px; border-radius: var(--radius-sm); font-size: 16px; font-weight: 700;
  border: none; cursor: pointer;
  background: linear-gradient(135deg, var(--g1), var(--g2));
  color: white; font-family: 'Space Grotesk', sans-serif;
  margin-top: 12px; transition: opacity 0.2s;
}
.btn-restart:hover { opacity: 0.88; }

/* HISTORY */
.history { display: flex; flex-direction: column; gap: 6px; }
.h-item { border-radius: var(--radius-sm); overflow: hidden; }
.h-ok { background: var(--green-bg); border: 1px solid var(--green-border); }
.h-bad { background: var(--red-bg); border: 1px solid var(--red-border); }
.h-top { display: flex; justify-content: space-between; align-items: center; padding: 9px 14px; gap: 8px; }
.h-code { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; color: #a78bfa; min-width: 50px; }
.h-name { font-size: 13px; color: var(--text2); flex: 1; }
.h-status { font-size: 14px; font-weight: 700; }
.h-typed { padding: 4px 14px 9px; font-size: 12px; color: #fca5a5; border-top: 1px solid var(--red-border); }

/* COUNTER */
.counter { text-align: center; font-size: 13px; color: var(--text3); margin-top: 10px; }

/* SECTION TITLE */
.section-title {
  display: none;
}

@media(max-width:600px){
  .container { padding: 1rem 0.85rem 5.5rem; }
  .header { margin-bottom: 1rem; }
  .header h1 { font-size: 1.8rem; }
  .header p { font-size: 13px; }
  .header-badge { font-size: 11px; padding: 3px 10px; }
  .score-bar { gap: 6px; margin-bottom: 0.75rem; }
  .pill { font-size: 12px; padding: 4px 10px; }
  .opts-grid { grid-template-columns: 1fr; }
  .list-grid { grid-template-columns: 1fr; }
  .q-code { font-size: 44px; letter-spacing: 3px; }
  .q-name { font-size: 18px; }
  .flip-face { padding: 1.25rem; min-height: 170px; }
  .flip-answer { font-size: 19px; }
  .flip-card { min-height: 170px; }
  .card { padding: 1.2rem; }
  .opt { padding: 14px 12px; font-size: 13px; }
  .ans-input { font-size: 16px; padding: 12px 14px; }
  .num-input { font-size: 26px; padding: 12px; }
  .feedback { font-size: 14px; padding: 12px; min-height: 48px; }
  .btn-next { padding: 13px; font-size: 14px; }
  .mark-btns { gap: 8px; }
  .btn-correct, .btn-wrong { padding: 13px 10px; font-size: 14px; }
  .result-pct { font-size: 56px; }
  .result-msg { font-size: 17px; }
}

/* BOTTOM NAV — mobil uchun */
.nav-tabs {
  display: grid; grid-template-columns: repeat(6,1fr);
  gap: 4px; margin-bottom: 2rem;
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 5px;
}
.tab {
  padding: 10px 4px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600;
  cursor: pointer; border: 1px solid transparent; background: transparent; color: var(--text2);
  font-family: 'Space Grotesk', sans-serif; transition: all 0.2s; text-align: center;
  line-height: 1.3;
}
.tab:hover { color: var(--text); background: var(--bg3); }
.tab.active {
  background: linear-gradient(135deg, rgba(124,58,237,0.3), rgba(37,99,235,0.3));
  color: #a78bfa; border-color: rgba(124,58,237,0.4);
}
@media(max-width:600px){
  .nav-tabs {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    grid-template-columns: repeat(6,1fr);
    margin: 0; border-radius: 0;
    border-top: 1px solid var(--border2); border-left: none; border-right: none; border-bottom: none;
    padding: 6px 4px calc(6px + env(safe-area-inset-bottom));
    background: rgba(16,16,32,0.97);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    gap: 2px;
  }
  .tab { padding: 6px 2px; font-size: 10px; border-radius: 8px; line-height: 1.2; }
  .tab.active { font-size: 10px; }
}
</style>

<script>
const data = [
  { code:'4010', name:"Xaridorlarning qarzi (debitorlik)",  sub:"Debitor qarz",                     keys:['xaridor','debitor','qarz','receivable','xaridorlar','debitorlik'] },
  { code:'6310', name:"Xaridorlardan olingan avans (kreditorlik)", sub:"Oldindan to'langan (majburiyat)",   keys:['xaridor','avans','oldindan','olindi','prepayment','olingan','kreditorlik'] },
  { code:'4310', name:"Sotuvchiga berilgan avans — tovar (debitorlik)", sub:"Tovar sotib olish uchun oldindan to'langan", keys:['tovar','sotib','avans','sotuvchi','debitorlik','4310','olish','tovar avans'] },
  { code:'4890', name:"Sotuvchiga berilgan avans — xizmat (debitorlik)", sub:"Xizmat olish uchun oldindan to'langan", keys:['xizmat','avans','sotuvchi','debitorlik','4890','berilgan','oldindan','xizmat avans'] },
  { code:'6990', name:"Sotuvchiga qarzimiz (kreditorlik)", sub:"Kreditor qarz",                     keys:['yetkazib','beruvchi','qarz','kreditor','payable','sotuvchi','kreditorlik'] },
  { code:'9020', name:"Tovar sotishdan daromad",         sub:"Asosiy faoliyat daromadi",          keys:['tovar','sotish','daromad','savdo','revenue','sotilgan'] },
  { code:'9120', name:"Tovar tannarxi",                  sub:"Sotilgan tovar qiymati",            keys:['tovar','tannarx','cost','narx','qiymat','tovarning'] },

  { code:'5720', name:"Terminal orqali sotilgan",        sub:"Plastik karta to'lovlari",          keys:['terminal','plastik','karta','pos','naqdsiz','sotilgan'] },
  { code:'5710', name:"Inkassatsiyaga berilgan naqd pul",    sub:"Bankka topshirilgan naqd pul",      keys:['inkassat','naqd','cash','bank','berilgan','topshirilgan'] },
  { code:'5010', name:"Kassa (naqd pul)",                sub:"Kassadagi naqd pul qoldig'i",       keys:['kassa','naqd','pul','cash','касса','наличные','qoldiq'] },
  { code:'9420', name:"Ma'muriyat xarajatlari",          sub:"Boshqaruv xarajatlari",             keys:["mamuriyat","ma'muriyat",'boshqaruv','admin','xarajat'] },
  { code:'9430', name:"Boshqa operatsion xarajat",       sub:"Qo'shimcha xarajatlar",             keys:['boshqa','operat','xarajat','other','qoshimcha',"qo'shimcha"] },
  { code:'2710', name:"Tugallanmagan xizmat",            sub:"Jarayondagi xizmat qiymati",         keys:['xizmat','tugallanmagan','незавер','wip','jarayon','tugallanmagan xizmat'] },
  { code:'2810', name:"Tayyor mahsulot",                 sub:"Ombordag tayyor mahsulot",            keys:['tayyor','mahsulot','maxsulot','готов','finished','ombor'] },
  { code:'1080', name:"Xo'jalik jihozlari va inventarlar", sub:"Aktiv — jihoz va inventarlar",     keys:['jihoz','inventar','xojalik','1080','xo\'jalik','инвентарь'] },
  { code:'2010', name:"Asosiy ishlab chiqarish",         sub:"Ishlab chiqarish bo'limi xarajatlari", keys:['ishlab','chiqarish','asosiy','2010','производство'] },
  { code:'9410', name:"Sotuv bo'limi xarajatlari",       sub:"Savdo xarajatlari",                   keys:['sotuv','savdo','bolim','9410','коммерческие'] },

function shuffle(a){ let b=[...a]; for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }
function norm(s){ return s.toLowerCase().replace(/['''`]/g,"'").replace(/\s+/g,' ').trim(); }
function similar(a,b){
  if(a===b) return true;
  if(a.length<3||b.length<3) return false;
  const s=a.length<=b.length?a:b, l=a.length<=b.length?b:a;
  if(l.includes(s)) return true;
  let d=0; for(let i=0;i<s.length;i++) if(s[i]!==l[i]) d++;
  d+=l.length-s.length; return d<=Math.max(2,Math.floor(s.length*0.3));
}
function checkTyped(typed, item){
  const t=norm(typed), n=norm(item.name);
  if(t===n) return true;
  if(similar(t,n)) return true;
  const tw=t.split(/\s+/), nw=n.split(/\s+/);
  if(tw.filter(x=>nw.some(y=>similar(x,y)||y.includes(x)||x.includes(y))).length>=2) return true;
  if(item.keys.filter(k=>t.includes(norm(k))||norm(k).includes(t)||tw.some(x=>norm(k).startsWith(x)||x.startsWith(norm(k)))).length>=2) return true;
  if(item.keys.some(k=>similar(t,norm(k)))) return true;
  return false;
}

/* --- 1: Nom → D/K variantlar --- */
function getConfusingDK(p){
  // Bir xil D yoki bir xil K bo'lgan — chalkashtiruvchi variantlar
  let sameD = provData.filter(x=>(x.d!==p.d||x.k!==p.k) && x.d===p.d);
  let sameK = provData.filter(x=>(x.d!==p.d||x.k!==p.k) && x.k===p.k);
  let sameGroup = provData.filter(x=>(x.d!==p.d||x.k!==p.k) && x.group===p.group);
  // D va K ni almashtirgan variant (d↔k)
  let swapped = provData.filter(x=>x.d===p.k && x.k===p.d);
  // Fiktiv chalkashtiruvchi: D yoki K ni 1 raqam o'zgartir
  function mutate(code){ const n=parseInt(code); return String(n+10); }
  const fakeOpts=[
    {d:mutate(p.d), k:p.k},
    {d:p.d, k:mutate(p.k)},
    {d:p.k, k:p.d},
    {d:mutate(p.d), k:mutate(p.k)},
  ];
  let pool=[...sameD,...sameK,...sameGroup,...swapped];
  pool=shuffle([...new Map(pool.map(x=>[x.d+'_'+x.k,x])).values()]);
  // Agar yetarli bo'lmasa fiktiv variantlar qo'sh
  while(pool.length<3){
    const f=fakeOpts[pool.length%fakeOpts.length];
    if(!pool.find(x=>x.d===f.d&&x.k===f.k) && (f.d!==p.d||f.k!==p.k)){
      pool.push({d:f.d, k:f.k, nom:'—', group:p.group, _fake:true});
    } else {
      pool.push({d:String(parseInt(p.d)+20), k:p.k, nom:'—', group:p.group, _fake:true});
    }
  }
  return pool.slice(0,3);
}

/* --- 2: D/K → Nom variantlar --- */
function getConfusingNom(p){
  // Bir guruhdan + boshqa guruhdan o'xshash nomlar
  let sameGroup=provData.filter(x=>x.nom!==p.nom && x.group===p.group);
  let similar=provData.filter(x=>x.nom!==p.nom && x.group!==p.group &&
    (x.nom.toLowerCase().split(' ').some(w=>p.nom.toLowerCase().includes(w)&&w.length>4)));
  let rest=provData.filter(x=>x.nom!==p.nom&&x.group!==p.group);
  let pool=[...sameGroup,...similar,...rest];
  pool=shuffle([...new Map(pool.map(x=>[x.nom,x])).values()]);
  return pool.slice(0,3);
}

function submitProvTyped(p){
  const dVal=document.getElementById('ans-d').value.trim();
  const kVal=document.getElementById('ans-k').value.trim();
  if(dVal.length<4||kVal.length<4){
    if(dVal.length<4) document.getElementById('ans-d').style.borderColor='var(--red)';
    if(kVal.length<4) document.getElementById('ans-k').style.borderColor='var(--red)';
    setTimeout(()=>{
      document.getElementById('ans-d').style.borderColor='';
      document.getElementById('ans-k').style.borderColor='';
    },600); return;
  }
  if(answered) return;
  answered=true;
  document.getElementById('ans-d').disabled=true;
  document.getElementById('ans-k').disabled=true;
  const fb=document.getElementById('fb');
  const nxt=document.getElementById('nxt');
  nxt.style.display='block';
  const dOk=dVal===p.d, kOk=kVal===p.k;
  if(dOk&&kOk){
    provRight++;
    document.getElementById('ans-d').className='num-input ok';
    document.getElementById('ans-k').className='num-input ok';
    fb.className='feedback fb-ok'; fb.textContent='✓ To\'g\'ri!';
    provHistory.push({p,dTyped:dVal,kTyped:kVal,ok:true});
  } else {
    provWrong++;
    if(!dOk) document.getElementById('ans-d').className='num-input no';
    if(!kOk) document.getElementById('ans-k').className='num-input no';
    fb.className='feedback fb-no';
    fb.innerHTML=`✗ Xato! To'g'ri: <span style="font-family:'JetBrains Mono',monospace;margin-left:8px;"><span style="color:#a78bfa">D ${p.d}</span> / <span style="color:#f87171">K ${p.k}</span></span>`;
    provHistory.push({p,dTyped:dVal,kTyped:kVal,ok:false});
  }
  updateProvScore();
}

function checkProvOpt(btn,chosen,correct,m){
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  answered=true;
  const fb=document.getElementById('fb');
  const nxt=document.getElementById('nxt');
  nxt.style.display='block';
  const p=provDeckArr[provCur];
  if(chosen===correct){
    btn.classList.add('correct'); provRight++;
    fb.className='feedback fb-ok'; fb.textContent='✓ To\'g\'ri!';
    provHistory.push({p,ok:true});
  } else {
    btn.classList.add('wrong'); provWrong++;
    // To'g'ri variantni yashil qil
    document.querySelectorAll('.opt').forEach(b=>{
      if(m==='nom2dk'){
        const txt=b.textContent.replace(/\s+/g,' ').trim();
        if(txt.includes('D '+p.d)&&txt.includes('K '+p.k)) b.classList.add('correct');
      } else if(m==='dk2nom'){
        if(b.textContent.trim()===p.nom) b.classList.add('correct');
      }
    });
    fb.className='feedback fb-no';
    if(m==='nom2dk') fb.innerHTML=`✗ Xato! To'g'ri: <span style="font-family:'JetBrains Mono',monospace;margin-left:8px;"><span style="color:#a78bfa">D ${p.d}</span> / <span style="color:#f87171">K ${p.k}</span></span>`;
    else fb.innerHTML=`✗ Xato! To'g'ri: <strong style="margin-left:6px">${p.nom}</strong>`;
    provHistory.push({p,ok:false});
  }
  updateProvScore();
}

function nextProv(m){
  provCur++;
  if(m==='nom2dk') renderProvNom2DK();
  else if(m==='dk2nom') renderProvDK2Nom();
  else if(m==='nom2typed') renderProvNom2Typed();
}

// Qurilma ID — localStorage da saqlanadi
function getDeviceId(){
  let id = localStorage.getItem('sd_device_id');
  if(!id){ id = 'dev_' + Date.now() + '_' + Math.random().toString(36).slice(2,8); localStorage.setItem('sd_device_id',id); }
  return id;
}
function getDeviceName(){
  const ua = navigator.userAgent;
  if(/iPhone/.test(ua)) return 'iPhone';
  if(/iPad/.test(ua)) return 'iPad';
  if(/Android/.test(ua)){
    const m = ua.match(/Android[^;]*;\s*([^)]+)\)/);
    return m ? m[1].trim().split(' ')[0] : 'Android';
  }
  if(/Windows/.test(ua)) return 'Windows PC';
  if(/Mac/.test(ua)) return 'Mac';
  return 'Qurilma';
}

function doLogin(){
  const login = document.getElementById('inp-login').value.trim();
  const pass  = document.getElementById('inp-pass').value.trim();
  const name  = document.getElementById('inp-name').value.trim();
  const msg   = document.getElementById('login-msg');
  if(login !== APP_LOGIN || pass !== APP_PASS){
    msg.textContent = 'Login yoki parol noto\'g\'ri!';
    document.getElementById('inp-pass').value='';
    return;
  }
  localStorage.setItem('sd_authed','yes');
  if(name) { localStorage.setItem('sd_username', name); currentUserName = name; }
  document.getElementById('login-overlay').remove();
  enterApp();
}

function enterApp(){
  document.getElementById('app-wrap').style.display='block';
  sessionStart = Date.now();
  trackOnline(true);
  onlineInterval = setInterval(()=>trackOnline(true), 30000);
  window.addEventListener('beforeunload', ()=>trackOnline(false));
}

async function trackOnline(online){
  const devName = getDeviceName();
  const uname   = localStorage.getItem('sd_username') || '—';
  try {
    await fetch(`${DB_URL}/online/${currentDeviceId}.json`,{
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        name: uname,
        device: devName,
        online: online,
        lastSeen: Date.now(),
        sessionStart: sessionStart,
        sessionMin: Math.round((Date.now()-sessionStart)/60000)
      })
    });
  } catch(e){}
}
